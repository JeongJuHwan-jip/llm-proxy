server:
  host: "0.0.0.0"
  port: 8000

failover:
  max_retries: 2
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown: 60
  routing_strategy: "priority"   # "priority" or "latency"

# Each routing entry becomes a selectable "model" in /v1/models.
# A chain is an ordered list of (server, model) pairs tried top-to-bottom.
# The same server URL can appear multiple times with different models —
# those steps share a single circuit-breaker state.
#
# Example: alpha/gpt-4 → beta/llama-3 → alpha/gpt-3.5 → beta/mistral
routing:
  - name: "best-available"
    chain:
      - url: "https://internal-alpha.company.com/v1"
        model: "gpt-4"
        timeout_ms: 5000
        name: "alpha"              # optional display name
        headers:
          X-Request-ID: "{{uuid}}"
          X-Service-Key: "fixed-value-123"

      - url: "https://internal-beta.company.com/v1"
        model: "llama-3-70b"
        timeout_ms: 8000
        name: "beta"
        headers:
          Authorization: "Bearer {{env:BETA_API_KEY}}"

      - url: "https://internal-gamma.company.com/v1"
        model: "mistral-7b"
        timeout_ms: 10000
        name: "gamma"

  # A second chain that falls back from gpt-4 on alpha to gpt-3.5 on the same
  # alpha server — same circuit-breaker, cheaper fallback model.
  - name: "gpt4-with-fallback"
    chain:
      - url: "https://internal-alpha.company.com/v1"
        model: "gpt-4"
        timeout_ms: 5000
        name: "alpha"
      - url: "https://internal-alpha.company.com/v1"  # same server, different model
        model: "gpt-3.5-turbo"
        timeout_ms: 5000
        name: "alpha"

logging:
  db_path: "./data/proxy.db"
  log_request_body: false

# Optional: restrict proxy access with API keys
# auth:
#   api_keys:
#     - "{{env:PROXY_API_KEY}}"
#     - "my-local-dev-key"
