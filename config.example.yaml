server:
  host: "0.0.0.0"
  port: 8000

endpoints:
  - name: "llm-api-alpha"
    url: "https://internal-alpha.company.com/v1"
    timeout_ms: 5000
    priority: 1
    headers:
      X-Request-ID: "{{uuid}}"
      X-Service-Key: "fixed-value-123"

  - name: "llm-api-beta"
    url: "https://internal-beta.company.com/v1"
    timeout_ms: 8000
    priority: 2
    headers:
      Authorization: "Bearer {{env:BETA_API_KEY}}"

  - name: "llm-api-gamma"
    url: "https://internal-gamma.company.com/v1"
    timeout_ms: 10000
    priority: 3

failover:
  max_retries: 2
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown: 60
  routing_strategy: "priority"   # "priority" or "latency"

# Named fallback chains — each appears as a selectable model in /v1/models.
# Each step specifies an endpoint (by name) + the model to request there.
# The same endpoint can appear multiple times with different models;
# all such steps share the endpoint's circuit-breaker state.
#
# Run `llm-proxy discover --config <file> --snippet` to auto-generate
# a routing: block from live model discovery.
routing:
  - name: "best-available"
    chain:
      - endpoint: llm-api-alpha
        model: gpt-4
      - endpoint: llm-api-beta
        model: llama-3-70b    # beta runs a different model
      - endpoint: llm-api-gamma
        model: mistral-7b     # gamma runs yet another model

  - name: "gpt4-with-fallback"
    chain:
      - endpoint: llm-api-alpha
        model: gpt-4
      - endpoint: llm-api-beta
        model: gpt-4
      - endpoint: llm-api-alpha   # same endpoint, cheaper fallback model
        model: gpt-3.5-turbo

logging:
  db_path: "./data/proxy.db"
  log_request_body: false

# Optional: restrict proxy access with API keys
# auth:
#   api_keys:
#     - "{{env:PROXY_API_KEY}}"
#     - "my-local-dev-key"
