# LLM Proxy — config.yaml
#
# This file is NOT tracked by git (personal per-deployment config).
# Copy this to config.yaml and fill in your actual URLs / keys.

# Proxy listening address — override at runtime with --host / --port flags.
proxy:
  host: "0.0.0.0"
  port: 8000
  # When a client-sent header conflicts with an endpoint's config header,
  # which one wins?  "config" (default) or "client"
  header_priority: "config"

# Upstream LLM servers (connection info only — no model binding here).
# Order matters: it determines the wildcard fallback order.
endpoints:
  - name: "alpha"
    url: "https://alpha.company.com/v1"
    timeout_ms: 5000
    headers:
      # {{uuid}}  → auto-generated UUID per request (NOT a placeholder you fill in)
      # {{env:X}} → reads the environment variable X at runtime
      X-Request-ID: "{{uuid}}"
      X-Service-Key: "my-fixed-key"

  - name: "beta"
    url: "https://beta.company.com/v1"
    timeout_ms: 8000
    headers:
      Authorization: "Bearer {{env:BETA_API_KEY}}"

  - name: "gamma"
    url: "https://gamma.company.com/v1"
    timeout_ms: 10000

# Failover — controls how the routing chain handles failures.
# Only applies to named routes (routing.yaml chains), not direct endpoint/model requests.
failover:
  # Max number of retry attempts per request.
  # e.g. 2 → try up to 3 steps total (1 initial + 2 retries) from the chain.
  max_retries: 2

  # How many consecutive failures (across different requests) before
  # an endpoint is temporarily taken out of rotation ("circuit open").
  # e.g. 3 → if alpha fails 3 requests in a row, skip it until cooldown expires.
  circuit_breaker_threshold: 3

  # Seconds to wait before retrying a circuit-opened endpoint.
  # After cooldown, the endpoint enters "half-open" — one test request is sent.
  # Success → back to normal ("closed"). Failure → open again for another cooldown.
  circuit_breaker_cooldown: 60

  # How to pick the next step when multiple are eligible.
  #   "priority" — follow the chain order as written
  #   "latency"  — prefer the endpoint with the lowest recent latency
  routing_strategy: "priority"

# Routing file (not tracked by git).
# Copy routing.example.yaml → routing.yaml and edit it.
# The proxy auto-discovers routing.yaml next to this file.
# To reload routing at runtime without restarting:
#   curl -X POST http://localhost:8000/api/routing/reload
#
# routing_file: routing.yaml   # default: auto-discovered next to this file

# Inline fallback (optional): used when routing.yaml is absent.
# routing:
#   - name: "best-available"
#     chain:
#       - endpoint: alpha
#         model: gpt-4
#       - endpoint: beta
#         model: llama-3-70b

logging:
  db_path: "./data/proxy.db"
  log_request_body: false

# Optional: restrict proxy access with API keys
# auth:
#   api_keys:
#     - "{{env:PROXY_API_KEY}}"
#     - "my-local-dev-key"
