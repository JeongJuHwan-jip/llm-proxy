server:
  host: "0.0.0.0"
  port: 8000

endpoints:
  - name: "llm-api-alpha"
    url: "https://internal-alpha.company.com/v1"
    timeout_ms: 5000
    priority: 1
    headers:
      X-Request-ID: "{{uuid}}"
      X-Service-Key: "fixed-value-123"

  - name: "llm-api-beta"
    url: "https://internal-beta.company.com/v1"
    timeout_ms: 8000
    priority: 2
    headers:
      Authorization: "Bearer {{env:BETA_API_KEY}}"

  - name: "llm-api-gamma"
    url: "https://internal-gamma.company.com/v1"
    timeout_ms: 10000
    priority: 3

failover:
  max_retries: 2
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown: 60
  routing_strategy: "priority"   # "priority" or "latency"

# Routing file (not tracked by git — personal per-deployment config).
# Copy routing.example.yaml → routing.yaml and edit it.
# The proxy auto-discovers routing.yaml next to this file; you can also
# set an explicit path here.
#
# To reload routing at runtime without restarting:
#   curl -X POST http://localhost:8000/api/routing/reload
#
# routing_file: routing.yaml   # default: auto-discovered next to this file

# Inline fallback (optional): used when routing.yaml is absent.
# routing:
#   - name: "best-available"
#     chain:
#       - endpoint: llm-api-alpha
#         model: gpt-4
#       - endpoint: llm-api-beta
#         model: llama-3-70b

logging:
  db_path: "./data/proxy.db"
  log_request_body: false

# Optional: restrict proxy access with API keys
# auth:
#   api_keys:
#     - "{{env:PROXY_API_KEY}}"
#     - "my-local-dev-key"
