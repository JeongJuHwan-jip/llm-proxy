# Local test config — works with scripts/mock_llm_server.py
#
# Start mock servers first:
#   python scripts/mock_llm_server.py --port 8001 --behavior timeout --name alpha --models gpt-4,claude-3
#   python scripts/mock_llm_server.py --port 8002 --behavior flaky --fail-rate 0.5 --name beta --models gpt-4,llama-3,mistral-7b
#   python scripts/mock_llm_server.py --port 8003 --behavior ok --name gamma --models mistral-7b
#
# Then start the proxy:
#   llm-proxy start --config config.local-test.yaml --port 9000

proxy:
  host: "127.0.0.1"
  port: 9000

endpoints:
  - name: "alpha"
    url: "http://127.0.0.1:8001/v1"
    timeout_ms: 2000          # alpha hangs → times out in 2s → failover
    headers:
      X-Request-ID: "{{uuid}}"

  - name: "beta"
    url: "http://127.0.0.1:8002/v1"
    timeout_ms: 3000

  - name: "gamma"
    url: "http://127.0.0.1:8003/v1"
    timeout_ms: 5000

failover:
  max_retries: 3
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown: 30
  routing_strategy: "priority"

# Named fallback chains — edit routing.yaml instead for hot-reload.
routing:
  - name: "best-available"
    chain:
      - endpoint: alpha
        model: gpt-4
      - endpoint: beta
        model: llama-3
      - endpoint: gamma
        model: mistral-7b

  - name: "gpt4-chain"
    chain:
      - endpoint: alpha
        model: gpt-4
      - endpoint: beta
        model: gpt-4
      - endpoint: alpha         # same endpoint, different model fallback
        model: claude-3

logging:
  db_path: "./data/local-test.db"
  log_request_body: true
